<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I Love You Robsi ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        /* Full screen photo background */
        .photo-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dark overlay so text is readable */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        /* Content on top */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Big Heart CSS */
        .heart {
            position: relative;
            width: 120px;
            height: 110px;
            margin: 0 auto 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .heart:before,
        .heart:after {
            position: absolute;
            content: '';
            left: 60px;
            top: 0;
            width: 60px;
            height: 95px;
            background: #ff3366;
            border-radius: 60px 60px 0 0;
            transform-origin: bottom center;
        }

        .heart:before {
            transform: rotate(-45deg);
            left: 0;
        }

        .heart:after {
            transform: rotate(45deg);
            left: 60px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); text-shadow: 0 0 30px rgba(255, 51, 102, 1); }
            100% { transform: scale(1); }
        }

        .text {
            color: white;
            font-size: 52px;
            font-weight: bold;
            text-shadow: 0 0 30px #ff3366, 0 0 60px #ff3366;
            margin-bottom: 10px;
        }

        .subtext {
            color: #ff6699;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
            margin-bottom: 30px;
        }

        /* Music Player */
        .music-player {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .music-player audio {
            width: 280px;
            outline: none;
            height: 40px;
        }

        .music-player audio::-webkit-media-controls-panel {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Floating small hearts */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .small-heart {
            position: absolute;
            font-size: 22px;
            opacity: 0.6;
            animation: float-up 5s linear infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-50px) scale(1); opacity: 0; }
        }

        .love-quote {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            font-style: italic;
            margin-top: 25px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <!-- Full Screen Photo -->
    <div class="photo-container">
        <img src="robsi.jpg" alt="Robsi">
    </div>

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <!-- Floating Hearts Background -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Content -->
    <div class="content">
        <div class="heart"></div>

        <div class="text">I Love You</div>
        <div class="subtext">Robsi ❤️</div>

        <!-- Music Player -->
        <div class="music-player">
            <audio controls autoplay loop>
                <source src="song.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </div>

        <div class="love-quote">
            💕 You are my everything 💕
        </div>
    </div>

    <script>
        // Floating hearts animation
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const symbols = ['❤', '💖', '💕', '💗', '💓', '🌸', '✨'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'small-heart';
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 6000);
            }, 400);
        }
        createFloatingHearts();
    </script>

</body>
</html>
